<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>신서하 돌잔치 초대장</title>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      background:linear-gradient(150deg,#fde8f0 0%,#faf4f8 50%,#eaf5ee 100%);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:24px 16px;font-family:'Gowun Batang',serif;
    }
    .card{
      background:#fffbfc;
      width:min(400px, 100%);
      border-radius:8px;overflow:hidden;
      box-shadow:0 20px 60px rgba(180,70,100,0.15);
      animation:fadeUp 1s cubic-bezier(0.22,1,0.36,1) both;
      display:flex;flex-direction:column;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

    .top-bar{height:6px;flex-shrink:0;background:linear-gradient(90deg,#f0c0d0,#e07090,#c090c8,#7aaa88,#f0c0d0)}

    /* ── Header ── */
    .header{
      padding:12px 24px 6px;text-align:center;flex-shrink:0;
      background:linear-gradient(180deg,#fff5f8 0%,#fffbfc 100%);
      position:relative;overflow:hidden;
    }
    .petal{position:absolute;width:10px;height:10px;border-radius:50% 0 50% 0;animation:floatPetal linear infinite;pointer-events:none}
    @keyframes floatPetal{
      0%{transform:translateY(-15px) rotate(0deg);opacity:0}
      10%{opacity:0.3}90%{opacity:0.08}100%{transform:translateY(700px) rotate(360deg);opacity:0}
    }
    .petal:nth-child(1){left:7%; background:#fbbdd0;animation-duration:7s;animation-delay:0s}
    .petal:nth-child(2){left:25%;background:#f9ccd8;animation-duration:9s;animation-delay:1.5s;width:8px;height:8px}
    .petal:nth-child(3){left:50%;background:#faddea;animation-duration:8s;animation-delay:0.9s}
    .petal:nth-child(4){left:73%;background:#fbbdd0;animation-duration:10s;animation-delay:2s;width:9px;height:9px}
    .petal:nth-child(5){left:88%;background:#f9ccd8;animation-duration:6s;animation-delay:0.4s}

    .branch-wrap{margin-bottom:4px}
    .badge{
      display:inline-block;background:linear-gradient(135deg,#f5b8c8,#e07090);
      color:#fff;font-family:'Nanum Myeongjo',serif;font-size:10px;letter-spacing:3px;
      padding:3px 16px;border-radius:2px;margin-bottom:6px;
    }
    .baby-name{font-family:'Nanum Myeongjo',serif;font-size:42px;font-weight:800;color:#5a3430;letter-spacing:-1px;line-height:1}
    .baby-name em{color:#e07090;font-style:normal}
    .subtitle{font-size:11px;color:#7aaa88;letter-spacing:4px;margin-top:3px}

    /* ── Divider ── */
    .divider{display:flex;align-items:center;gap:8px;padding:0 26px;margin:2px 0;flex-shrink:0}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,#f0afc0,transparent)}
    .divider span{font-size:11px}

    /* ── Photo ── */
    .photo-wrap{display:flex;justify-content:center;padding:2px 0;flex-shrink:0}
    .photo-outer{position:relative;width:200px;height:200px}
    .photo-circle{
      width:170px;height:170px;border-radius:50%;
      border:4px solid #f5b8c8;overflow:hidden;
      box-shadow:0 6px 24px rgba(220,100,130,0.22);
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;
    }
    .photo-circle img{width:100%;height:100%;object-fit:cover;object-position:center center}
    .wreath-svg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:3;pointer-events:none}

    /* ── Message ── */
    .message{padding:2px 28px 2px;text-align:center;flex-shrink:0}
    .message p{font-size:12px;line-height:1.85;color:#6b4848}
    .message strong{color:#e07090}

    /* ── Info ── */
    .info-block{
      margin:4px 20px;flex-shrink:0;
      text-align:center;
    }
    .info-header{
      font-family:'Nanum Myeongjo',serif;
      font-size:11px;letter-spacing:3px;color:#e07090;
      margin-bottom:8px;
    }
    .info-row{padding:3px 0;}
    .info-label{display:none}
    .info-value{font-size:12.5px;color:#5a3430;line-height:1.7}
    .info-value strong{color:#5a3430;font-weight:700}

    /* ── Parents ── */
    .parents{text-align:center;padding:2px 24px 6px;flex-shrink:0}
    .parents-title{font-size:9px;letter-spacing:3px;color:#e07090;margin-bottom:4px}
    .parents-names{font-family:'Nanum Myeongjo',serif;font-size:13px;color:#5a3430;line-height:1.8}
    .role{color:#c0a0a0;font-size:10px;margin-right:2px}
    .sep{color:#f0afc0;margin:0 8px}
    .spring-icons{margin-top:4px;display:flex;justify-content:center;gap:5px;font-size:11px;opacity:0.5}

    .bottom-bar{height:6px;flex-shrink:0;background:linear-gradient(90deg,#7aaa88,#c090c8,#e07090,#f0c0d0,#7aaa88)}
  </style>
</head>
